name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────── Backend Tests ────────────────
  backend:
    name: 🐍 Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --ignore=E501,W503

      - name: Verify API starts
        run: |
          cd backend
          timeout 10 python -c "
          import app
          client = app.app.test_client()
          # Test all endpoints
          endpoints = ['/states', '/gender', '/first-dose', '/second-dose', '/total-dose', '/latest', '/vaccines']
          for ep in endpoints:
              res = client.get(ep)
              assert res.status_code == 200, f'{ep} returned {res.status_code}'
              print(f'✅ {ep} → 200 OK')
          print('All API endpoints passed!')
          "

  # ──────────────── Frontend Build ────────────────
  frontend:
    name: ⚛️ Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend

      - name: Verify build output
        run: |
          if [ -d "frontend/dist" ]; then
            echo "✅ Build output exists"
            ls -lh frontend/dist/
          else
            echo "❌ Build output missing"
            exit 1
          fi

  # ──────────────── Docker Build and Push ────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/covid-dashboard-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/covid-dashboard-frontend:latest
